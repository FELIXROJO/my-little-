<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregunta Especial</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeef2;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #main-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #btn-si {
            background-color: #4CAF50;
            color: white;
            z-index: 100;
        }

        #btn-no {
            background-color: #f44336;
            color: white;
        }

        /* Pantalla de éxito */
        #celebration {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .heart-anim {
            font-size: 100px;
            animation: beat 0.8s infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        h2 {
            color: #e63946;
            font-size: 4rem;
        }
    </style>
</head>
<body>

    <div id="main-card">
        <h1 id="pregunta">¿Tú me amas?</h1>
        <div class="buttons">
            <button id="btn-si" onclick="aceptar()">Sí</button>
            <button id="btn-no" onclick="crecerSi()">No</button>
        </div>
    </div>

    <div id="celebration">
        <div class="heart-anim">💍</div>
        <h2>¡CASATE CONMIGO!</h2>
        <div class="heart-anim">❤️</div>
    </div>

    <script>
        let scale = 1;
        let fontSize = 1.2;

        function crecerSi() {
            // El botón "Si" crece cada vez que se presiona "No"
            scale += 0.5;
            fontSize += 0.5;
            
            const btnSi = document.getElementById('btn-si');
            btnSi.style.transform = `scale(${scale})`;
            btnSi.style.fontSize = `${fontSize}rem`;
            
            // Mover el botón "No" un poco para que sea más difícil
            const btnNo = document.getElementById('btn-no');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            // Opcional: descomenta la siguiente línea si quieres que el "No" escape
            // btnNo.style.position = 'absolute'; btnNo.style.left = x + 'px'; btnNo.style.top = y + 'px';
        }

        function aceptar() {
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('celebration').style.display = 'flex';
            
            // Lanzar confeti (opcional si tienes internet)
            confetti();
        }

        // Un pequeño efecto de confeti básico
        function confetti() {
            for(let i=0; i<100; i++) {
                const div = document.createElement('div');
                div.innerHTML = "🌸";
                div.style.position = "fixed";
                div.style.left = Math.random() * 100 + "vw";
                div.style.top = "-20px";
                div.style.fontSize = (Math.random() * 20 + 10) + "px";
                div.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(div);
            }
        }
    </script>

    <style>
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>

</body>
</html>
