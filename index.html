<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pony Creator Mobile</title>
    <style>
        :root {
            --primary: #6a1b9a;
            --accent: #ff4081;
            --bg: #0f0f0f;
            --card: #1e1e1e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Área de Visualización (Arriba) */
        #viewport {
            flex: 1;
            position: relative;
            background: radial-gradient(circle, #2c3e50, #000);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            touch-action: none;
        }

        /* Panel de Controles (Abajo) */
        #controls {
            height: 45vh;
            background: var(--card);
            border-top: 3px solid var(--primary);
            padding: 15px;
            overflow-y: auto;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .scroll-x {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }
        .scroll-x::-webkit-scrollbar { display: none; }

        .pony-btn {
            flex: 0 0 80px;
            height: 80px;
            background: #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            font-size: 10px;
            text-align: center;
            transition: 0.2s;
        }

        .pony-btn.active { border-color: var(--accent); background: #444; }

        .dot { width: 30px; height: 30px; border-radius: 50%; margin-bottom: 5px; border: 2px solid white; }

        .custom-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }

        input[type="color"] {
            width: 100%; height: 45px; border: none; background: #333; border-radius: 10px; padding: 5px;
        }

        input[type="range"] { width: 100%; accent-color: var(--accent); margin-top: 10px; }

        #gen-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3);
        }

        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            font-size: 10px;
            color: #0f0;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="status">> ENGINE_READY<br>> V: 2.0_MOBILE</div>
        <canvas id="ponyCanvas"></canvas>
    </div>

    <div id="controls">
        <label>Selecciona Personaje Base</label>
        <div class="scroll-x" id="ponyList"></div>

        <div class="custom-section">
            <div>
                <label>Color Cuerpo</label>
                <input type="color" id="bodyColor" value="#D19FE8">
            </div>
            <div>
                <label>Color Melena</label>
                <input type="color" id="maneColor" value="#6a1b9a">
            </div>
        </div>

        <div style="margin-top:15px;">
            <label>Nivel de Magia: <span id="pwr-text">50</span>%</label>
            <input type="range" id="power" min="0" max="100" value="50">
        </div>

        <button id="gen-btn">GENERAR EN TIEMPO REAL</button>
    </div>

    <script>
        const canvas = document.getElementById('ponyCanvas');
        const ctx = canvas.getContext('2d');
        
        // Ajuste de resolución para pantallas Retina/High-DPI
        function resize() {
            const size = Math.min(window.innerWidth, window.innerHeight * 0.5);
            canvas.width = size * 2;
            canvas.height = size * 2;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
        }
        window.onresize = resize;
        resize();

        const data = [
            { id: 'twi', name: 'Twilight', body: '#D19FE8', mane: '#6a1b9a' },
            { id: 'aj', name: 'Applejack', body: '#F39C12', mane: '#FDFEFE' },
            { id: 'rd', name: 'Rainbow', body: '#2980B9', mane: '#C0392B' },
            { id: 'rar', name: 'Rarity', body: '#FFFFFF', mane: '#4A235A' },
            { id: 'fs', name: 'Flutter', body: '#F7DC6F', mane: '#F5B7B1' },
            { id: 'pp', name: 'Pinkie', body: '#FF69B4', mane: '#C71585' }
        ];

        let selected = data[0];

        // Crear botones
        const list = document.getElementById('ponyList');
        data.forEach(p => {
            const btn = document.createElement('div');
            btn.className = 'pony-btn' + (p.id === 'twi' ? ' active' : '');
            btn.innerHTML = `<div class="dot" style="background:${p.body}"></div>${p.name}`;
            btn.onclick = () => {
                document.querySelectorAll('.pony-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selected = p;
                document.getElementById('bodyColor').value = p.body;
                document.getElementById('maneColor').value = p.mane;
                draw();
            };
            list.appendChild(btn);
        });

        function draw() {
            const bCol = document.getElementById('bodyColor').value;
            const mCol = document.getElementById('maneColor').value;
            const pwr = document.getElementById('power').value;
            document.getElementById('pwr-text').innerText = pwr;

            const w = canvas.width;
            const h = canvas.height;
            const s = w / 400; // Factor de escala

            ctx.clearRect(0,0,w,h);
            
            // Aura de poder
            if(pwr > 10) {
                ctx.shadowBlur = pwr * s;
                ctx.shadowColor = mCol;
            }

            ctx.save();
            ctx.translate(w/2 - 50*s, h/2 + 50*s);

            // Cuerpo
            ctx.fillStyle = bCol;
            // Pata trasera
            ctx.fillRect(0, 0, 30*s, 80*s);
            // Pata delantera
            ctx.fillRect(80*s, 0, 30*s, 80*s);
            // Torso
            ctx.beginPath();
            ctx.ellipse(55*s, -20*s, 60*s, 40*s, 0, 0, Math.PI*2);
            ctx.fill();
            // Cuello y Cabeza
            ctx.beginPath();
            ctx.ellipse(100*s, -80*s, 35*s, 40*s, 0, 0, Math.PI*2);
            ctx.fill();

            // Melena
            ctx.fillStyle = mCol;
            ctx.beginPath();
            ctx.moveTo(70*s, -110*s);
            ctx.lineTo(130*s, -140*s);
            ctx.lineTo(150*s, -80*s);
            ctx.lineTo(100*s, -60*s);
            ctx.closePath();
            ctx.fill();

            // Ojo
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(115*s, -90*s, 8*s, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(118*s, -90*s, 4*s, 0, Math.PI*2);
            ctx.fill();

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        document.getElementById('gen-btn').onclick = draw;
        document.getElementById('power').oninput = draw;
        
        // Ejecución inicial
        setTimeout(draw, 100);
    </script>
</body>
</html>
