<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aether Infinity v21.5</title>

<style>
:root {
    --primary: #ff77bc;
    --secondary: #b377ff;
    --accent: #77e5ff;
    --bg: #050505;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    color: white;
}

canvas { position: fixed; top: 0; left: 0; z-index: 0; }

#stage {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    position: relative;
    z-index: 2;
    perspective: 1000px;
}

.window {
    background: white;
    color: black;
    padding: 30px;
    border-radius: 30px;
    width: 520px;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,.4);
    animation: fadeIn 0.5s ease-out;
}

.hidden { display: none !important; }

button {
    padding: 15px;
    border: none;
    border-radius: 20px;
    margin: 6px;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    color: white;
    width: 100%;
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

button:hover { transform: scale(1.05); filter: brightness(1.1); }

.opt { background: white; color: black; border: 2px solid #eee; text-align: left; font-weight: 500; }
.opt:hover { background: #fdf0f7; border-color: var(--primary); transform: translateX(5px); }

.card { background: #fafafa; padding: 15px; border-radius: 15px; margin: 10px 0; border: 1px solid #eee; }

#progressBar { width: 100%; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
#progressFill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: 0.4s ease-in-out; }

/* Animaciones de Impacto Mágico */
.magic-vibe { animation: magicVibe 0.4s ease-out; }
@keyframes magicVibe {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); box-shadow: 0 0 30px var(--accent); }
    100% { transform: scale(1); }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* Pantalla Te Amo Amor */
#love {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: white; display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 9999;
}
.heart { font-size: 140px; color: #ff3b6b; animation: beat 0.5s infinite alternate; }
@keyframes beat { from { transform: scale(1); } to { transform: scale(1.25); } }
.loveText { font-size: 60px; color: #ff77bc; font-family: 'Brush Script MT', cursive; margin-top: 20px; text-shadow: 2px 2px 0px #ffe0f0; }
</style>
</head>

<body>
<canvas id="bg"></canvas>

<div id="stage">
    <div id="menu" class="window">
        <h2>AETHER INFINITY</h2>
        <div id="list" style="max-height: 300px; overflow-y: auto;"></div>
        <button onclick="newPony()">✨ Crear Pony</button>
    </div>

    <div id="create" class="window hidden">
        <h3>Nombre del Pony</h3>
        <input id="name" style="padding:15px; width:85%; border-radius:30px; border:2px solid var(--accent); text-align:center; font-size:1.2rem; outline:none;">
        <br><br>
        <button onclick="startTest()">Comenzar Ritual</button>
        <button onclick="back()" style="background:none; color:#999; box-shadow:none;">Volver</button>
    </div>

    <div id="test" class="window hidden">
        <div id="progressBar"><div id="progressFill"></div></div>
        <div id="progressText" style="font-size: 0.8rem; color: var(--primary); font-weight: bold; margin-bottom: 10px;"></div>
        <h3 id="question" style="text-align: left; line-height: 1.5; color: var(--secondary);"></h3>
        <div id="options"></div>
    </div>

    <div id="result" class="window hidden">
        <h2 id="r_name" style="margin-bottom: 5px;"></h2>
        <p id="r_race" style="font-weight: 900; color: var(--secondary); letter-spacing: 2px; text-transform: uppercase;"></p>
        <p id="r_level" style="font-weight: bold; color: var(--accent);"></p>
        <p id="r_story" style="font-size: 0.9rem; color: #666; font-style: italic;"></p>
        <h3>Habilidades</h3>
        <div id="r_skills"></div>
        <button onclick="save()" style="background: #ffcc00; color: black; margin-top: 20px;">💖 Guardar en la Red</button>
    </div>
</div>

<div id="love" class="hidden">
    <div class="heart">❤️</div>
    <div class="loveText">TE AMO AMOR</div>
</div>

<script>
// --- ESTRELLAS ---
const canvas = document.getElementById("bg"), ctx = canvas.getContext("2d");
let w, h, stars = [];
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.onresize = resize; resize();
for(let i=0; i<150; i++) stars.push({x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.5, v: Math.random()*0.3});
function draw() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0,0,w,h);
    stars.forEach(s => { s.y -= s.v; if(s.y<0) s.y=h; ctx.fillStyle="#ff77bc"; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
    requestAnimationFrame(draw);
} draw();

// --- LÓGICA DE JUEGO ---
let store = JSON.parse(localStorage.getItem("mlp_aether_v21_5")) || [];
let active = null, step = 0;

// Diccionario de Singularidad (Evita repeticiones)
const lexicon = {
    s: ["Un portal mágico", "El cristal del imperio", "La sombra de Luna", "Un eco del bosque", "La brisa de Ponyville", "Un sueño de Celestia", "El mapa del destino", "Una chispa de magia"],
    v: ["ilumina", "fragmenta", "despierta", "revela", "consume", "teje", "protege", "sana"],
    o: ["tu alma pony", "la armonía", "el futuro", "la realidad", "tu corazón", "el destino", "el reino", "el tiempo"]
};
let pool = { s: [], v: [], o: [] };

function show(id) {
    ["menu","create","test","result","love"].forEach(v => document.getElementById(v).classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

function newPony() { document.getElementById("name").value = ""; show("create"); }
function back() { show("menu"); refresh(); }

function startTest() {
    const name = document.getElementById("name").value.trim();
    if(!name) return;
    active = { name, magic: 0, kind: 0, power: 0, skills: [], level: 1 };
    step = 0;
    // Barajado de sesión
    pool.s = [...lexicon.s].sort(() => Math.random() - 0.5);
    pool.v = [...lexicon.v].sort(() => Math.random() - 0.5);
    pool.o = [...lexicon.o].sort(() => Math.random() - 0.5);
    show("test"); run();
}

function run() {
    const fill = document.getElementById("progressFill");
    fill.style.width = (step / 5 * 100) + "%";
    document.getElementById("progressText").innerText = `SINCRONIZACIÓN ${step + 1} / 5`;

    if(step >= 5) { finish(); return; }

    // Extracción física (Cero repetición)
    const s = pool.s.pop(), v = pool.v.pop(), o = pool.o.pop();
    document.getElementById("question").innerText = `${s} ${v} ${o}. ¿Cómo reacciona tu magia?`;

    const box = document.getElementById("options"); box.innerHTML = "";
    
    // Generación dinámica de respuestas basada en el contexto
    const ops = [
        {t: `Usar magia para proteger ${o}`, type: "magic"},
        {t: `Ayudar con amistad a ${o}`, type: "kind"},
        {t: `Enfrentar con poder a ${s.toLowerCase()}`, type: "power"}
    ].sort(() => Math.random() - 0.5);

    ops.forEach(op => {
        const b = document.createElement("button");
        b.className = "opt";
        b.innerText = op.t;
        b.onclick = () => {
            const win = document.getElementById("test");
            win.classList.remove("magic-vibe"); void win.offsetWidth; win.classList.add("magic-vibe");
            active[op.type]++;
            step++;
            setTimeout(run, 400); // Pequeña pausa para ver la vibración
        };
        box.appendChild(b);
    });
}

function finish() {
    if(active.magic > active.power && active.magic > active.kind) active.race = "Unicornio Arcano";
    else if(active.power > active.magic && active.power > active.kind) active.race = "Pegaso Guerrero";
    else if(active.kind > active.power) active.race = "Pony de la Armonía";
    else active.race = "Alicornio Legendario";

    active.level = Math.floor(Math.random() * 10) + 1;
    active.skills = [skill(), skill()];
    active.story = "Un pony cuyo destino fue marcado por la red neural de Equestria.";
    render();
}

function skill() {
    const names = ["Resonancia Estelar", "Nexo de Cristal", "Pulso de Armonía", "Alma Prismática", "Tormenta Celestial", "Llama Astral"];
    return names[Math.floor(Math.random() * names.length)];
}

function render() {
    show("result");
    document.getElementById("r_name").innerText = active.name.toUpperCase();
    document.getElementById("r_race").innerText = active.race;
    document.getElementById("r_level").innerText = "Nivel mágico: " + active.level;
    document.getElementById("r_story").innerText = active.story;
    const s = document.getElementById("r_skills"); s.innerHTML = "";
    active.skills.forEach(v => {
        const d = document.createElement("div"); d.className = "card"; d.innerHTML = `<b>TALENTO:</b> ${v}`;
        s.appendChild(d);
    });
}

function save() {
    store.push(active);
    localStorage.setItem("mlp_aether_v21_5", JSON.stringify(store));
    const love = document.getElementById("love");
    love.classList.remove("hidden");
    setTimeout(() => {
        love.classList.add("hidden");
        back();
    }, 5000); // 5 segundos de Te Amo Amor
}

function refresh() {
    const list = document.getElementById("list"); list.innerHTML = "";
    store.forEach((p, i) => {
        const d = document.createElement("div"); d.className = "card";
        d.innerHTML = `<b>${p.name}</b><br><small>${p.race}</small><br><button onclick="del(${i})" style="padding:5px; background:#ff4b4b; margin-top:5px; font-size:0.7rem;">ELIMINAR</button>`;
        list.appendChild(d);
    });
}

function del(i) { store.splice(i, 1); localStorage.setItem("mlp_aether_v21_5", JSON.stringify(store)); refresh(); }

refresh();
</script>
</body>
</html>
