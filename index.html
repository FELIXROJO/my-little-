<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aether Infinity v21</title>

<style>

:root{
--primary:#ff77bc;
--secondary:#b377ff;
--accent:#77e5ff;
--bg:#050505;
}

body{
margin:0;
background:var(--bg);
font-family:Segoe UI;
overflow:hidden;
color:white;
}

#stage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.window{
background:white;
color:black;
padding:30px;
border-radius:30px;
width:500px;
max-width:90%;
text-align:center;
}

.hidden{display:none;}

button{
padding:15px;
border:none;
border-radius:20px;
margin:5px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(135deg,var(--secondary),var(--primary));
color:white;
width:100%;
}

.opt{
background:white;
color:black;
border:2px solid #eee;
}

.opt:hover{
background:var(--secondary);
color:white;
}

.card{
background:#fafafa;
padding:15px;
border-radius:15px;
margin:10px 0;
}

</style>
</head>

<body>

<div id="stage">

<div id="menu" class="window">
<h2>AETHER INFINITY</h2>

<div id="list"></div>

<button onclick="newPony()">Crear Pony</button>
</div>

<div id="create" class="window hidden">

<h3>Nombre del Pony</h3>

<input id="name" style="padding:10px;width:80%">

<br><br>

<button onclick="startTest()">Comenzar</button>

<button onclick="back()">Volver</button>

</div>

<div id="test" class="window hidden">

<div id="progress"></div>

<h3 id="question"></h3>

<div id="options"></div>

</div>

<div id="result" class="window hidden">

<h2 id="r_name"></h2>

<p id="r_race"></p>

<p id="r_level"></p>

<p id="r_story"></p>

<h3>Habilidades</h3>

<div id="r_skills"></div>

<button onclick="save()">Guardar</button>

<button onclick="back()">Volver</button>

</div>

</div>

<script>

let store = JSON.parse(localStorage.getItem("aether")) || []

let active = null
let step = 0

const questions = [

{q:"Un portal mágico aparece frente a ti",type:"magic"},
{q:"Un amigo necesita ayuda",type:"kind"},
{q:"Una tormenta amenaza la ciudad",type:"power"},
{q:"Descubres un cristal antiguo",type:"magic"},
{q:"Un enemigo desafía tu destino",type:"power"}

]

function newPony(){
show("create")
}

function back(){
show("menu")
refresh()
}

function show(id){

["menu","create","test","result"].forEach(v=>{
document.getElementById(v).classList.add("hidden")
})

document.getElementById(id).classList.remove("hidden")

}

function startTest(){

const name = document.getElementById("name").value

if(!name)return

active = {
name:name,
magic:0,
kind:0,
power:0,
skills:[],
level:1
}

step=0

show("test")

run()

}

function run(){

if(step>=questions.length){

finish()

return

}

const q = questions[step]

document.getElementById("question").innerText=q.q

const box=document.getElementById("options")

box.innerHTML=""

createOption("Usar magia antigua","magic")
createOption("Ayudar con amistad","kind")
createOption("Enfrentar con poder","power")

}

function createOption(text,type){

const b=document.createElement("button")

b.className="opt"

b.innerText=text

b.onclick=()=>{

active[type]++

step++

run()

}

document.getElementById("options").appendChild(b)

}

function finish(){

let race=""

if(active.magic>active.power) race="Unicornio Arcano"
else if(active.power>active.magic) race="Pegaso Guerrero"
else race="Alicornio Legendario"

active.race=race

active.level = Math.floor(Math.random()*10)+1

active.skills.push(skill())

active.skills.push(skill())

story()

render()

}

function skill(){

const names=[

"Resonancia Estelar",
"Nexo de Cristal",
"Pulso de Armonía",
"Alma Prismática",
"Tormenta Celestial"

]

return names[Math.floor(Math.random()*names.length)]

}

function story(){

active.story =
"Un pony cuyo destino fue marcado por la magia de Equestria. Su espíritu mezcla valor, amistad y poder."

}

function render(){

show("result")

document.getElementById("r_name").innerText=active.name

document.getElementById("r_race").innerText=active.race

document.getElementById("r_level").innerText="Nivel mágico: "+active.level

document.getElementById("r_story").innerText=active.story

const s=document.getElementById("r_skills")

s.innerHTML=""

active.skills.forEach(v=>{

const d=document.createElement("div")

d.className="card"

d.innerText=v

s.appendChild(d)

})

}

function save(){

store.push(active)

localStorage.setItem("aether",JSON.stringify(store))

back()

}

function refresh(){

const list=document.getElementById("list")

list.innerHTML=""

store.forEach((p,i)=>{

const d=document.createElement("div")

d.className="card"

d.innerHTML=
"<b>"+p.name+"</b><br>"+p.race+
"<br>Nivel "+p.level+
"<br><button onclick='del("+i+")'>Borrar</button>"

list.appendChild(d)

})

}

function del(i){

store.splice(i,1)

localStorage.setItem("aether",JSON.stringify(store))

refresh()

}

refresh()

</script>

</body>
</html>
