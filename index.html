<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Cloud: MLP Archive v13.0</title>
    <style>
        :root { --primary: #ff77bc; --secondary: #b377ff; --accent: #77e5ff; --bg: #fff5f9; --card: #ffffff; --text: #5a4a5e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; overflow-x: hidden; }
        #app-container { background: var(--card); padding: 2rem; border-radius: 30px; border: 4px solid var(--secondary); box-shadow: 0 15px 40px rgba(179, 119, 255, 0.15); width: 100%; max-width: 600px; text-align: center; position: relative; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid var(--accent); border-radius: 50px; text-align: center; font-size: 1.1rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--secondary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 12px; transition: 0.3s; box-shadow: 0 4px 0 #8a4fff; font-size: 0.9rem; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #8a4fff; }
        .stat-box { border: 2px dashed var(--primary); padding: 20px; margin: 15px 0; background: #fff9fc; border-radius: 20px; text-align: left; }
        .q-text { color: var(--secondary); font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; line-height: 1.5; text-align: left; border-left: 4px solid var(--primary); padding-left: 15px; }
        .opt-btn { background: white; color: var(--text); border: 2px solid var(--accent); text-transform: none; text-align: left; font-weight: normal; box-shadow: 0 3px 0 var(--accent); }
        #love-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: fadeIn 0.5s ease; }
        .heart { font-size: 7rem; animation: beat 0.8s infinite; color: #ff4b4b; cursor: pointer; }
        .love-msg { font-size: 3rem; font-family: 'Brush Script MT', cursive; color: var(--primary); margin-top: 20px; text-shadow: 2px 2px #ffe0f0; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="app-container">
    <h1 style="color: var(--primary);">🧠 NEURAL CLOUD v13.0</h1>

    <div id="screen-network">
        <div style="background: var(--accent); color: white; padding: 5px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; display: inline-block;">RED DE APRENDIZAJE ACTIVA</div>
        <h3 style="color: var(--secondary);">EXPEDIENTES GUARDADOS</h3>
        <div id="user-list" style="margin-bottom: 25px; max-height: 300px; overflow-y: auto; padding: 10px;"></div>
        <button id="btn-new-user">✨ CREAR NUEVA CONEXIÓN</button>
    </div>

    <div id="screen-login" class="hidden">
        <p>Introduce tu nombre para sincronizar:</p>
        <input type="text" id="name-input" placeholder="NOMBRE DEL PONI" autocomplete="off">
        <button id="btn-init">VINCULAR ALMA</button>
        <button id="btn-cancel" style="background:none; color:var(--text); box-shadow:none;">VOLVER</button>
    </div>

    <div id="screen-test" class="hidden">
        <p id="q-step" style="font-size: 0.8rem; color: var(--primary); font-weight: bold;"></p>
        <div id="q-content" class="q-text"></div>
        <div id="options-grid" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <div id="screen-profile" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <button id="btn-back-net" style="width: auto; padding: 8px 20px; font-size: 0.7rem;">CERRAR</button>
            <button id="btn-save" style="width: auto; padding: 8px 20px; font-size: 0.7rem; background:#ffcc00; box-shadow: 0 4px 0 #ccaa00;">💾 GUARDAR</button>
        </div>
        <div class="stat-box">
            <h2 id="char-name" style="margin:0; color: var(--primary); text-align: center;"></h2>
            <p id="char-rank" style="text-align: center; font-weight: bold; color: var(--secondary);"></p>
        </div>
        <div class="stat-box">
            <strong style="color: var(--secondary);">MEMORIA COGNITIVA (IA):</strong>
            <div id="skills-list" style="margin-top: 15px;"></div>
        </div>
        <button id="btn-learn">🧠 FORZAR APRENDIZAJE IA</button>
    </div>
</div>

<div id="love-screen" class="hidden">
    <div class="heart">💖</div>
    <div class="love-msg">TE AMO AMOR</div>
    <p style="margin-top: 50px; opacity: 0.5;">Toca el corazón para volver</p>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        let database = JSON.parse(localStorage.getItem('mlp_neural_db')) || [];
        let activeChar = null;
        let score = 0, qIdx = 0;

        const ui = { net: 'screen-network', log: 'screen-login', test: 'screen-test', pro: 'screen-profile' };
        function show(screen) { Object.values(ui).forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(screen).classList.remove('hidden'); }

        function generateAIAbility() {
            const pre = ["Ecos", "Prisma", "Vínculo", "Cénit", "Aura"];
            const mid = ["del Destino", "de Cristal", "Eterno", "de Almas"];
            const eff = ["siente el corazón ajeno", "reescribe el tiempo", "protege contra sombras", "amplifica la alegría"];
            return { name: `${pre[Math.floor(Math.random()*5)]} ${mid[Math.floor(Math.random()*4)]}`, desc: `IA aprendió: ${eff[Math.floor(Math.random()*4)]}.` };
        }

        function refreshUserList() {
            const list = document.getElementById('user-list');
            list.innerHTML = database.length ? "" : "<p style='opacity:0.5'>Sin expedientes.</p>";
            database.forEach((char, i) => {
                const div = document.createElement('div');
                div.style = "display:flex; justify-content:space-between; align-items:center; background:#fdf0f7; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid var(--primary);";
                div.innerHTML = `<div style='text-align:left;'><strong>${char.name}</strong><br><small>${char.rank}</small></div>
                                 <button onclick="loadUser(${i})" style="width:auto; padding:5px 15px; margin:0; font-size:0.7rem;">ABRIR</button>`;
                list.appendChild(div);
            });
        }

        window.loadUser = (i) => { activeChar = database[i]; renderProfile(); };

        document.getElementById('btn-new-user').onclick = () => show(ui.log);
        document.getElementById('btn-init').onclick = () => {
            const val = document.getElementById('name-input').value.trim();
            if(!val) return;
            activeChar = { name: val, rank: "Buscando Talento...", skills: [], id: Date.now() };
            score = 0; qIdx = 0;
            show(ui.test);
            runQuiz();
        };

        function runQuiz() {
            if(qIdx >= 3) {
                activeChar.rank = score > 80 ? "Alicornio Nexus" : "Unicornio de Luz";
                activeChar.skills.push(generateAIAbility());
                database.push(activeChar);
                save(); renderProfile(); return;
            }
            document.getElementById('q-step').innerText = `SINAPSIS: ${qIdx + 1} / 3`;
            document.getElementById('q-content').innerText = "¿Cómo reaccionaría tu magia ante un cristal oscuro que absorbe la alegría?";
            const grid = document.getElementById('options-grid'); grid.innerHTML = "";
            [{t:"Lo abrazo con amor",p:40}, {t:"Lo destruyo",p:10}, {t:"Busco ayuda",p:25}].forEach(ans => {
                const b = document.createElement('button'); b.className = "opt-btn"; b.innerText = ans.t;
                b.onclick = () => { score += ans.p; qIdx++; runQuiz(); };
                grid.appendChild(b);
            });
        }

        function renderProfile() {
            show(ui.pro);
            document.getElementById('char-name').innerText = activeChar.name.toUpperCase();
            document.getElementById('char-rank').innerText = activeChar.rank;
            const list = document.getElementById('skills-list'); list.innerHTML = "";
            activeChar.skills.forEach(s => {
                list.innerHTML += `<div style="margin-bottom:10px; border-left:3px solid var(--accent); padding-left:10px;"><small><strong>${s.name}</strong>: ${s.desc}</small></div>`;
            });
        }

        function save() { localStorage.setItem('mlp_neural_db', JSON.stringify(database)); }
        document.getElementById('btn-learn').onclick = () => { activeChar.skills.push(generateAIAbility()); save(); renderProfile(); };
        document.getElementById('btn-save').onclick = () => { save(); document.getElementById('love-screen').classList.remove('hidden'); };
        document.getElementById('btn-back-net').onclick = () => { refreshUserList(); show(ui.net); };
        document.querySelector('.heart').onclick = () => document.getElementById('love-screen').classList.add('hidden');
        refreshUserList();
    });
</script>
</body>
</html>
