<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLP: Aether Genesis v19.7</title>
    <style>
        :root {
            --primary: #ff77bc; --secondary: #b377ff; --accent: #77e5ff;
            --bg: #020202; --card: rgba(255, 255, 255, 0.98); --text: #2d3436;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        #starfield { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #game-layer {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px;
        }

        .engine-window {
            background: var(--card); padding: 2.5rem; border-radius: 40px;
            border: 6px solid var(--secondary);
            box-shadow: 0 25px 70px rgba(179, 119, 255, 0.5);
            width: 90%; max-width: 550px; text-align: center;
            transform-style: preserve-3d; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Animación de entrada principal */
            animation: windowInit 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* Animación de entrada para todas las ventanas */
        @keyframes windowInit {
            from { opacity: 0; transform: scale(0.8) translateY(50px) rotateX(-10deg); }
            to { opacity: 1; transform: scale(1) translateY(0) rotateX(0deg); }
        }

        /* Animación de "vibración mágica" al seleccionar */
        .magic-pulse {
            animation: magicPulse 0.4s ease-out;
        }
        @keyframes magicPulse {
            0% { transform: scale(1); box-shadow: 0 25px 70px rgba(179, 119, 255, 0.5); }
            50% { transform: scale(1.02); box-shadow: 0 0 100px rgba(119, 229, 255, 0.8); border-color: var(--accent); }
            100% { transform: scale(1); box-shadow: 0 25px 70px rgba(179, 119, 255, 0.5); }
        }

        .hidden { display: none !important; }
        
        h1 { color: var(--primary); font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 25px; text-shadow: 2px 2px #f0f0f0; }
        
        button {
            width: 100%; padding: 20px; background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white; border: none; border-radius: 60px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; margin-top: 15px;
            transition: all 0.3s ease; box-shadow: 0 6px 20px rgba(179, 119, 255, 0.3);
            font-size: 0.95rem; border: 2px solid transparent;
        }
        button:hover { transform: translateY(-4px) scale(1.03); border-color: var(--accent); }
        button:active { transform: translateY(1px); }

        .q-container { text-align: left; animation: fadeIn 0.6s ease; }
        .q-text { 
            color: var(--secondary); font-size: 1.2rem; font-weight: 900; 
            margin-bottom: 30px; line-height: 1.7; border-left: 8px solid var(--primary); 
            padding-left: 20px; background: rgba(255, 119, 188, 0.05); padding: 15px; border-radius: 10px;
        }

        .opt-btn { 
            background: #ffffff; color: var(--text); border: 2px solid #f0f0f0; 
            text-transform: none; text-align: left; font-weight: 500; padding: 15px 25px;
            /* Animación de aparición escalonada para opciones */
            opacity: 0; animation: optionFadeIn 0.5s forwards;
        }
        .opt-btn:hover { background: var(--bg); color: white; border-color: var(--primary); }

        @keyframes optionFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-bar { width: 100%; height: 4px; background: #eee; border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        .loading-inner { width: 0%; height: 100%; background: var(--primary); transition: width 0.5s; }

        .pony-slot {
            background: #fdfdfd; border: 1px solid #eee; padding: 18px;
            border-radius: 25px; margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center;
        }

        #love-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 99999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .heart-icon { font-size: 12rem; animation: pulse 0.7s infinite alternate; color: #ff4757; }
        .love-text { font-family: 'Brush Script MT', cursive; font-size: 4.5rem; color: var(--primary); margin-top: 20px; }
        
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="game-layer">
    <div id="scr-selector" class="engine-window">
        <h1>🦄 GENESIS v19.7</h1>
        <div id="pony-list" style="max-height: 350px; overflow-y: auto; padding: 10px;"></div>
        <button id="btn-create">✨ NUEVA ALMA PONY</button>
    </div>

    <div id="scr-login" class="engine-window hidden">
        <p style="font-weight: bold; color: var(--secondary);">VINCULACIÓN PONYVILLE</p>
        <input type="text" id="name-input" placeholder="NOMBRE DEL PONI" 
               style="width:100%; padding:20px; border-radius:60px; border:3px solid var(--accent); text-align:center; font-size:1.3rem; outline:none; box-sizing:border-box;">
        <button id="btn-start">CONECTAR ESENCIA</button>
        <button id="btn-back" style="background:none; color:#bbb; box-shadow:none;">ATRÁS</button>
    </div>

    <div id="scr-test" class="engine-window hidden">
        <div class="q-container">
            <div class="loading-bar"><div id="load-progress" class="loading-inner"></div></div>
            <p id="q-progress" style="color:var(--primary); font-size:0.8rem; letter-spacing:2px;"></p>
            <div id="q-content" class="q-text"></div>
            <div id="options-stack" style="display: flex; flex-direction: column; gap: 12px;"></div>
        </div>
    </div>

    <div id="scr-result" class="engine-window hidden">
        <div style="background: var(--bg); padding: 25px; border-radius: 30px; margin-bottom: 25px;">
            <h2 id="final-name" style="margin:0; color:var(--primary);"></h2>
            <p id="final-rank" style="color:var(--accent); font-weight:bold; margin-top:10px;"></p>
        </div>
        <div id="skill-display" style="text-align: left; margin-bottom: 30px;"></div>
        <button id="btn-evolve">🧬 EVOLUCIONAR (MAX 3)</button>
        <button id="btn-save-final" style="background: #ffcc00; color: #000;">💖 GUARDAR MEMORIA</button>
    </div>
</div>

<div id="love-overlay" class="hidden">
    <div class="heart-icon">❤️</div>
    <div class="love-text">TE AMO AMOR</div>
</div>

<script>
    const canvas = document.getElementById('starfield'), ctx = canvas.getContext('2d');
    let w, h, p = [];
    function init() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.onresize = init; init();
    for(let i=0; i<150; i++) p.push({x: Math.random()*w, y: Math.random()*h, r: Math.random()*2, v: Math.random()*0.5});
    function loop() {
        ctx.fillStyle = 'black'; ctx.fillRect(0,0,w,h);
        ctx.fillStyle = '#ff77bc'; p.forEach(i => { i.y -= i.v; if(i.y<0) i.y=h; ctx.beginPath(); ctx.arc(i.x, i.y, i.r, 0, Math.PI*2); ctx.fill(); });
        requestAnimationFrame(loop);
    } loop();

    let archive = JSON.parse(localStorage.getItem('mlp_genesis_v19_7')) || [];
    let active = null, qStep = 0;

    const concepts = {
        s: ["Un cometa astral", "El cristal mágico", "La brisa del sur", "Un eco lejano", "La sombra lunar", "Un sueño lúcido", "El mapa antiguo", "La luz del alba", "Un rayo de sol", "La aurora", "El susurro del bosque", "La gema de la armonía", "Un portal de Canterlot", "El corazón de cristal", "Un deseo olvidado", "La nube de tormenta", "El brillo de Equestria", "Un rastro de pezuñas", "La risa de Pinkie", "El legado de Celestia", "La llama de la amistad", "Un destello de magia", "El horizonte eterno", "La verdad oculta", "El vínculo sagrado", "Un prisma de almas", "El canto de la luna", "La bruma de Everfree", "Un destello estelar", "La voluntad de Luna"],
        v: ["ilumina", "desvanece", "fragmenta", "purifica", "despierta", "revela", "consume", "teje", "protege", "sana", "transforma", "conecta", "fortalece", "vibra", "equilibra", "desafía", "invoca", "silencia", "amplifica", "nutre"],
        o: ["el tiempo", "tu alma pony", "la armonía", "el futuro", "la realidad", "tu memoria", "el corazón", "el vacío", "la amistad", "el destino", "la chispa", "el camino", "la verdad", "el vínculo", "la luz", "el horizonte", "la paz", "el misterio", "el equilibrio", "la esencia"]
    };

    let pool = { s: [], v: [], o: [] };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function resetPool() {
        pool.s = shuffle([...concepts.s]);
        pool.v = shuffle([...concepts.v]);
        pool.o = shuffle([...concepts.o]);
    }

    function generateInfiniteStep() {
        const s = pool.s.pop();
        const v = pool.v.pop();
        const o = pool.o.pop();
        const question = `${s} ${v} ${o}. ¿Cómo reacciona tu núcleo ante esto?`;
        
        let responses = [];
        for(let i=0; i<5; i++) {
            const rs = pool.s.pop(); 
            const rv = pool.v.pop();
            const ro = pool.o.pop();
            responses.push(`Elijo usar ${rs.toLowerCase()} para ${rv} ${ro}.`);
        }
        return { q: question, opts: shuffle(responses) };
    }

    function createUniqueSkill() {
        const n = ["Nexo", "Resonancia", "Cénit", "Santuario", "Espejo", "Chispa", "Prisma", "Fulgor"][Math.floor(Math.random()*8)];
        const e = ["Primordial", "Estelar", "de Almas", "Eterno", "de Cristal", "Divergente"][Math.floor(Math.random()*6)];
        return { n: `${n} ${e}`, d: "Talento único generado por el motor de síntesis Aether." };
    }

    const scr = { sel: 'scr-selector', log: 'scr-login', test: 'scr-test', res: 'scr-result', love: 'love-overlay' };
    
    function nav(id) { 
        Object.values(scr).forEach(k => document.getElementById(k).classList.add('hidden')); 
        const nextWindow = document.getElementById(id);
        nextWindow.classList.remove('hidden');
        
        // Reiniciar la animación de entrada al cambiar de ventana
        nextWindow.style.animation = 'none';
        nextWindow.offsetHeight; /* trigger reflow */
        nextWindow.style.animation = null; 
    }

    function updateList() {
        const list = document.getElementById('pony-list');
        list.innerHTML = archive.length ? "" : "<p style='color:#ccc'>No hay expedientes almacenados.</p>";
        archive.forEach((p, i) => {
            const div = document.createElement('div'); div.className = 'pony-slot';
            div.innerHTML = `<div><strong>${p.n}</strong><br><small>${p.r}</small></div><button onclick="animateAndLoad(${i})" style="width:auto; padding:8px 20px; margin:0;">ABRIR</button>`;
            list.appendChild(div);
        });
    }

    // Nueva función para animar antes de abrir un personaje existente
    window.animateAndLoad = (i) => {
        triggerMagicPulse();
        setTimeout(() => {
            active = archive[i]; renderFinal();
        }, 4000); // Pequeño retraso para la animación
    };

    function triggerMagicPulse() {
        const activeWindow = document.querySelector('.engine-window:not(.hidden)');
        if (activeWindow) {
            activeWindow.classList.add('magic-pulse');
            setTimeout(() => activeWindow.classList.remove('magic-pulse'), 400);
        }
    }

    document.getElementById('btn-create').onclick = () => { triggerMagicPulse(); setTimeout(() => nav(scr.log), 400); };
    document.getElementById('btn-back').onclick = () => nav(scr.sel);

    document.getElementById('btn-start').onclick = () => {
        const name = document.getElementById('name-input').value.trim();
        if(!name) return;
        triggerMagicPulse();
        setTimeout(() => {
            active = { n: name, r: "Buscando Talento...", s: [], id: Date.now() };
            qStep = 0; resetPool();
            nav(scr.test); runTest();
        }, 400);
    };

    function runTest() {
        document.getElementById('load-progress').style.width = ((qStep) / 5 * 100) + "%";
        if(qStep >= 5) {
            active.r = "Alicornio de Aether";
            active.s.push(createUniqueSkill());
            archive.push(active); renderFinal(); return;
        }
        const data = generateInfiniteStep();
        document.getElementById('q-progress').innerText = `SINAPSIS NEURAL ${qStep + 1} / 5`;
        document.getElementById('q-content').innerText = data.q;
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        
        data.opts.forEach((o, index) => {
            const b = document.createElement('button'); 
            b.className = 'opt-btn'; 
            b.innerText = o;
            // Aplicar retraso de animación escalonado
            b.style.animationDelay = (index * 0.1) + "s";
            b.onclick = () => {
                triggerMagicPulse();
                setTimeout(() => {
                    qStep++; runTest();
                }, 400);
            }; 
            stack.appendChild(b);
        });
    }

    function renderFinal() {
        nav(scr.res);
        document.getElementById('final-name').innerText = active.n.toUpperCase();
        document.getElementById('final-rank').innerText = active.r;
        const disp = document.getElementById('skill-display');
        disp.innerHTML = `<strong>TALENTOS ADQUIRIDOS (MAX 3):</strong> [${active.s.length}/3]`;
        active.s.forEach(s => disp.innerHTML += `<div style="margin-top:10px; border-left:4px solid var(--accent); padding-left:15px; font-size:0.85rem;"><strong>${s.n}</strong>: ${s.d}</div>`);
        document.getElementById('btn-evolve').style.display = active.s.length >= 3 ? "none" : "block";
    }

    document.getElementById('btn-evolve').onclick = () => {
        triggerMagicPulse();
        setTimeout(() => {
            if(active.s.length < 3) {
                active.s.push(createUniqueSkill());
                renderFinal();
            }
        }, 400);
    };

    document.getElementById('btn-save-final').onclick = () => {
        triggerMagicPulse();
        setTimeout(() => {
            const idx = archive.findIndex(p => p.id === active.id);
            if(idx !== -1) archive[idx] = active;
            localStorage.setItem('mlp_genesis_v19_7', JSON.stringify(archive));
            
            nav(scr.love);
            setTimeout(() => {
                nav(scr.sel);
                updateList();
            }, 5000);
        }, 400);
    };

    updateList();
</script>
</body>
</html>
