<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equestria Adventure 🦄</title>
    <style>
        :root { --pink-primary: #f472b6; --pink-dark: #db2777; --bg-soft: #fdf2f8; }
        body { background-color: var(--bg-soft); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-card { background: white; border: 4px solid var(--pink-primary); padding: 30px; width: 90%; max-width: 500px; border-radius: 20px; box-shadow: 0 15px 35px rgba(219, 39, 119, 0.2); text-align: center; position: relative; }
        #game-card::before { content: '✨'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 2rem; }
        #text { font-size: 1.2rem; color: #4a5568; margin-bottom: 25px; line-height: 1.6; min-height: 100px; }
        .options-grid { display: grid; gap: 10px; }
        .btn { background: var(--pink-primary); color: white; border: none; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.3s ease; border-bottom: 4px solid var(--pink-dark); }
        .btn:hover { background: var(--pink-dark); transform: translateY(-2px); border-bottom-width: 2px; margin-bottom: 2px; }
        .btn:active { transform: translateY(2px); border-bottom-width: 0; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="game-card">
        <div id="text">Cargando la magia de la amistad...</div>
        <div id="options" class="options-grid"></div>
    </div>

    <script>
        const textElement = document.getElementById('text');
        const optionsElement = document.getElementById('options');

        const story = {
            1: {
                text: "🍎 ¡Bienvenida a Ponyville! Applejack te intercepta: '¡Caramelito! ¡El Gran Banquete de la Amistad empieza ya y no tenemos el postre! ¡Ayúdanos!'",
                options: [
                    { text: "⚡ Buscar a Rainbow Dash", next: 2 },
                    { text: "🎈 Ir con Pinkie Pie", next: 3 }
                ]
            },
            2: {
                text: "⚡ Rainbow Dash despeja el cielo en 10 segundos. '¡Oye! Para darte las manzanas mágicas dime: ¿Cuál es el valor más fuerte de Equestria?'",
                options: [
                    { text: "✨ ¡La Amistad!", next: 4 },
                    { text: "💪 ¡La Lealtad!", next: 4 }
                ]
            },
            3: {
                text: "🎈 Pinkie Pie sale de un cañón de confeti. '¡Oki Doki Lokie! Te daré el postre si admites que quien programó esto te ama mucho.'",
                options: [
                    { text: "💖 ¡Es el mejor novio del mundo!", next: 4 }
                ]
            },
            4: {
                text: "🏰 Llegas al castillo. Twilight Sparkle y las demás te aclaman. 'Has salvado el banquete. Eres la pony más especial de este mundo'. \n\n (Te quiero más que a todos los libros de Canterlot)",
                options: [
                    { text: "Reiniciar Aventura 🌈", next: 1 }
                ]
            }
        };

        function render(id) {
            const node = story[id];
            textElement.innerText = node.text;
            optionsElement.innerHTML = '';
            node.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.text;
                btn.className = 'btn';
                btn.onclick = () => render(opt.next);
                optionsElement.appendChild(btn);
            });
        }

        render(1);
    </script>
</body>
</html>
