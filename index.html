<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Cloud v13.7 - Protocolo Bloqueado</title>
    <style>
        :root { --primary: #ff77bc; --secondary: #b377ff; --accent: #77e5ff; --bg: #fff5f9; --card: #ffffff; --text: #5a4a5e; --danger: #ff4b4b; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #app-container { background: var(--card); padding: 2rem; border-radius: 30px; border: 4px solid var(--secondary); box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .hidden { display: none !important; }
        .stat-box { border: 2px dashed var(--primary); padding: 20px; margin: 15px 0; background: #fff9fc; border-radius: 20px; }
        button { width: 100%; padding: 16px; background: var(--secondary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 12px; box-shadow: 0 4px 0 #8a4fff; font-size: 1rem; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a4fff; }
        #love-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .heart { font-size: 8rem; animation: beat 0.8s infinite; color: #ff4b4b; cursor: pointer; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="app-container">
    <div id="screen-profile">
        <h1 style="color: var(--primary);">🧠 NEURAL CLOUD</h1>
        <div class="stat-box">
            <strong>ARCHIVO:</strong> Poni Detectado<br>
            <strong>ESTADO:</strong> Listo para guardar.
        </div>
        <button id="btn-start">💾 GUARDAR DATOS</button>
    </div>

    <div id="screen-questions" class="hidden">
        <div class="stat-box" style="border-color: var(--danger);">
            <h2 id="q-text" style="color: var(--danger);">¿SEGURO?</h2>
            <p id="q-counter" style="font-weight: bold; color: var(--secondary); font-size: 1.2rem;"></p>
            <button id="btn-next">SÍ</button>
        </div>
    </div>
</div>

<div id="love-screen" class="hidden">
    <div class="heart">💖</div>
    <h1 style="font-family: cursive; color: var(--primary);">¿TE CASARÍAS CONMIGO?</h1>
    <p>Validación 50/50 completada.</p>
</div>

<script>
    const state = { count: 0, max: 50 };
    
    const views = {
        profile: document.getElementById('screen-profile'),
        questions: document.getElementById('screen-questions'),
        love: document.getElementById('love-screen')
    };

    const elements = {
        title: document.getElementById('q-text'),
        counter: document.getElementById('q-counter'),
        btnStart: document.getElementById('btn-start'),
        btnNext: document.getElementById('btn-next')
    };

    // 1. Iniciar proceso
    elements.btnStart.onclick = () => {
        views.profile.classList.add('hidden');
        views.questions.classList.remove('hidden');
        updateUI();
    };

    // 2. Lógica del botón SÍ (El "Guardián")
    elements.btnNext.onclick = () => {
        state.count++;

        if (state.count >= state.max) {
            // SOLO AQUÍ pasamos al final
            views.questions.classList.add('hidden');
            views.love.classList.remove('hidden');
        } else {
            // Si no es 50, REFRESCAMOS la misma pantalla de pregunta
            updateUI();
        }
    };

    function updateUI() {
        // Lógica de textos que pediste
        if (state.count === 48) {
            elements.title.innerText = "¿SEGURO SEGURO?";
        } else if (state.count === 49) {
            elements.title.innerText = "¿TOTALMENTE SEGURO?";
        } else {
            elements.title.innerText = "¿SEGURO?";
        }

        elements.counter.innerText = `Paso ${state.count + 1} de ${state.max}`;
    }

    document.querySelector('.heart').onclick = () => location.reload();
</script>

</body>
</html>
