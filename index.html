<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLP: Quantum Heart v22.1</title>
    <style>
        :root {
            --primary: #ff77bc; --secondary: #b377ff; --accent: #77e5ff;
            --bg: #050505; --card: rgba(255, 255, 255, 0.98); --text: #2d3436;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; }
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #stage { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; perspective: 1500px; }

        .window {
            background: var(--card); padding: 2.5rem; border-radius: 40px; border: 6px solid var(--secondary);
            box-shadow: 0 25px 70px rgba(179, 119, 255, 0.5); width: 90%; max-width: 500px; text-align: center;
            animation: emerge 0.6s cubic-bezier(0.17, 0.67, 0.8, 1); transform-style: preserve-3d;
        }

        /* Animaciones de IA */
        .magic-vibe { animation: magicVibe 0.4s ease-out; }
        @keyframes magicVibe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 50px var(--accent); } }
        @keyframes emerge { from { opacity: 0; transform: scale(0.8) rotateX(-20deg); } to { opacity: 1; transform: scale(1) rotateX(0); } }

        .hidden { display: none !important; }
        button {
            padding: 18px; border: none; border-radius: 50px; margin: 8px 0; cursor: pointer; font-weight: 900;
            background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; width: 100%;
            text-transform: uppercase; transition: 0.3s; box-shadow: 0 5px 15px rgba(179, 119, 255, 0.3);
        }
        button:hover { transform: translateY(-3px) scale(1.02); }

        .opt { background: white; color: var(--text); border: 2px solid #eee; text-transform: none; font-weight: 500; text-align: left; }
        .opt:hover { border-color: var(--primary); background: #fff9fc; }

        .loading-bar { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .loading-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.4s; }

        /* Consola de Comandos Derecha */
        #console {
            position: fixed; right: -350px; top: 0; width: 300px; height: 100%;
            background: rgba(0, 0, 0, 0.95); border-left: 3px solid var(--primary);
            color: #ff77bc; font-family: 'Courier New', monospace; padding: 20px;
            z-index: 100000; transition: 0.5s; box-sizing: border-box; overflow-y: auto;
        }
        #console.active { right: 0; box-shadow: -10px 0 30px rgba(255, 119, 188, 0.3); }
        .console-input { width: 100%; background: none; border: 1px solid #444; color: #ff77bc; padding: 8px; outline: none; margin-top: 10px; }

        #love { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .heart { font-size: 10rem; animation: beat 0.6s infinite; color: #ff4b4b; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div id="stage">
    <div id="menu" class="window">
        <h2 style="color:var(--primary)">AETHER COMMAND v22.1</h2>
        <div id="list" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
        <button onclick="nav('create')">✨ CREAR NUEVO PONI</button>
        <p style="font-size:0.6rem; color:#ccc;">Presiona F2 para acceso raíz</p>
    </div>

    <div id="create" class="window hidden">
        <h3>Ritual de Sincronía</h3>
        <input id="name-in" placeholder="NOMBRE DEL PONI" style="width:100%; padding:15px; border-radius:30px; border:2px solid var(--accent); text-align:center; font-size:1.2rem; outline:none;">
        <button onclick="startIA()" style="margin-top:20px;">INICIAR IA</button>
        <button onclick="nav('menu')" style="background:none; color:#999; box-shadow:none;">VOLVER</button>
    </div>

    <div id="test" class="window hidden">
        <div class="loading-bar"><div id="load-fill" class="loading-fill"></div></div>
        <div id="q-box" style="text-align: left; line-height: 1.5; font-weight: bold; color: var(--secondary); margin-bottom: 20px; min-height: 60px;"></div>
        <div id="options"></div>
    </div>

    <div id="result" class="window hidden">
        <h2 id="res-name" style="margin:0; color:var(--primary);"></h2>
        <p id="res-race" style="font-weight:900; color:var(--secondary); text-transform:uppercase;"></p>
        <div id="res-skills"></div>
        <button id="btn-ev" onclick="evolve()">🧬 EVOLUCIONAR (MÁX 3)</button>
        <button onclick="save()" style="background:#ffcc00; color:black;">💖 GUARDAR MEMORIA</button>
    </div>
</div>

<div id="console">
    <div style="font-size:0.9rem; border-bottom:1px solid #333; padding-bottom:5px;">[RAÍZ: AETHER_OS]</div>
    <div id="console-logs" style="font-size:0.8rem; margin-top:10px;"></div>
    <input type="text" id="cmd-in" class="console-input" placeholder="Comando...">
</div>

<div id="love" class="hidden">
    <div class="heart">❤️</div>
    <div style="font-family:cursive; font-size:4rem; color:var(--primary);">TE AMO AMOR</div>
</div>

<script>
    // --- FONDO ANIMADO ---
    const canvas = document.getElementById('canvas-bg'), ctx = canvas.getContext('2d');
    let w, h, stars = [];
    function setup() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.onresize = setup; setup();
    for(let i=0; i<150; i++) stars.push({x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.5, v: Math.random()*0.4});
    function render() {
        ctx.fillStyle = '#050505'; ctx.fillRect(0,0,w,h);
        ctx.fillStyle = '#ff77bc'; stars.forEach(s => { s.y -= s.v; if(s.y<0) s.y=h; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); });
        requestAnimationFrame(render);
    } render();

    // --- LÓGICA IA DE SINGULARIDAD ---
    let db = JSON.parse(localStorage.getItem("mlp_aether_v22_1")) || [];
    let cur = null, step = 0;
    const lexicon = {
        s: ["Un cristal mágico", "La sombra de Luna", "El eco del bosque", "Un sueño lúcido", "La brisa lunar", "El mapa antiguo", "La aurora boreal", "Un cometa estelar"],
        v: ["ilumina", "desvanece", "fragmenta", "purifica", "despierta", "revela", "consume", "teje"],
        o: ["el tiempo", "tu alma pony", "la armonía", "el futuro", "la realidad", "tu corazón", "el destino", "el vacío"]
    };
    let pool = { s: [], v: [], o: [] };

    function nav(id) { 
        document.querySelectorAll('.window').forEach(w => w.classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
    }

    function startIA() {
        const name = document.getElementById('name-in').value.trim();
        if(!name) return;
        cur = { name, skills: [], race: "", id: Date.now() }; step = 0;
        pool.s = [...lexicon.s].sort(()=>Math.random()-0.5);
        pool.v = [...lexicon.v].sort(()=>Math.random()-0.5);
        pool.o = [...lexicon.o].sort(()=>Math.random()-0.5);
        nav('test'); run();
    }

    function run() {
        document.getElementById("load-fill").style.width = (step / 5 * 100) + "%";
        if(step >= 5) { finish(); return; }
        // CERO REPETICIÓN: Extraemos de la memoria
        const s = pool.s.pop(), v = pool.v.pop(), o = pool.o.pop();
        document.getElementById("q-box").innerText = `${s} ${v} ${o}. ¿Cómo actúa tu esencia?`;
        const box = document.getElementById("options"); box.innerHTML = "";
        const ops = [`Protejo ${o} con magia.`, `Me adapto a ${v} con valor.`, `Busco equilibrio en ${s.toLowerCase()}.`, `Guío ${o} hacia la luz.`, `Sano ${o} con amistad.`].sort(()=>Math.random()-0.5);
        ops.forEach(t => {
            const b = document.createElement("button"); b.className = "opt"; b.innerText = t;
            b.onclick = () => { 
                document.getElementById('test').classList.add('magic-vibe');
                setTimeout(() => { document.getElementById('test').classList.remove('magic-vibe'); step++; run(); }, 400);
            };
            box.appendChild(b);
        });
    }

    function finish() {
        const races = ["Unicornio Arcano", "Pegaso Guerrero", "Terrestre de Cristal", "Alicornio Legendario"];
        cur.race = races[Math.floor(Math.random()*races.length)];
        cur.skills = [genSkill()];
        renderRes();
    }

    function genSkill() {
        const names = ["Resonancia Estelar", "Nexo de Cristal", "Pulso de Armonía", "Cénit Eterno", "Llama de Amistad"];
        return names[Math.floor(Math.random()*names.length)];
    }

    function evolve() {
        if(cur.skills.length < 3) {
            cur.skills.push(genSkill());
            renderRes();
        }
    }

    function renderRes() {
        nav('result');
        document.getElementById('res-name').innerText = cur.name.toUpperCase();
        document.getElementById('res-race').innerText = cur.race;
        document.getElementById('btn-ev').style.display = cur.skills.length >= 3 ? 'none' : 'block';
        const s = document.getElementById('res-skills'); s.innerHTML = "";
        cur.skills.forEach(v => { s.innerHTML += `<div class="opt" style="padding:12px; margin-bottom:8px; border-radius:15px;">✨ ${v}</div>`; });
    }

    function save() {
        db.push(cur); localStorage.setItem("mlp_aether_v22_1", JSON.stringify(db));
        document.getElementById('love').classList.remove('hidden');
        // LOOP DE 5 SEGUNDOS
        setTimeout(() => { document.getElementById('love').classList.add('hidden'); refresh(); nav('menu'); }, 5000);
    }

    function refresh() {
        const list = document.getElementById('list'); list.innerHTML = "";
        db.forEach((p, i) => {
            list.innerHTML += `<div class="opt" style="padding:15px; margin-bottom:10px; border-radius:20px; display:flex; justify-content:space-between; align-items:center;">
                <span><b>${p.name}</b><br><small>${p.race} (${p.skills.length}/3)</small></span>
                <button onclick="del(${i})" style="width:auto; padding:8px 12px; margin:0; font-size:0.7rem; background:#ff4b4b;">BORRAR</button></div>`;
        });
    }

    function del(i) { db.splice(i, 1); localStorage.setItem("mlp_aether_v22_1", JSON.stringify(db)); refresh(); }

    // --- CONSOLA DE COMANDOS (CONTRASEÑA: 6663) ---
    window.addEventListener('keydown', (e) => {
        if(e.key === 'F2') {
            const pass = prompt("Acceso Raíz Aether. Ingresa Clave:");
            if(pass === "6663") { // Nueva contraseña aplicada
                document.getElementById('console').classList.toggle('active');
            } else {
                alert("Acceso Denegado.");
            }
        }
    });

    document.getElementById('cmd-in').addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const cmd = e.target.value;
            const log = document.getElementById('console-logs');
            if(cmd === "/wipe") { db = []; localStorage.clear(); log.innerHTML += "> [!] MEMORIA BORRADA.<br>"; refresh(); }
            else if(cmd === "/status") { log.innerHTML += `> Conexiones: ${db.length}<br>> Motor: Quantum v22.1<br>`; }
            else { log.innerHTML += `> CMD: '${cmd}' no reconocido.<br>`; }
            e.target.value = "";
        }
    });

    refresh();
</script>
</body>
</html>
