<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLP: Aether Core IA</title>
    <style>
        :root { --primary: #ff77bc; --secondary: #b377ff; --accent: #77e5ff; --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.95); }
        body { background: var(--bg); color: #333; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* Fondo Animado de IA */
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(2px); }

        #app-container { background: var(--card); padding: 2rem; border-radius: 30px; border: 4px solid var(--secondary); box-shadow: 0 0 50px rgba(179, 119, 255, 0.4); width: 90%; max-width: 500px; text-align: center; position: relative; backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        
        button { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 15px rgba(179, 119, 255, 0.3); }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        
        .q-text { color: var(--secondary); font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; text-align: left; line-height: 1.4; border-left: 5px solid var(--primary); padding-left: 15px; animation: slideIn 0.5s ease; }
        .opt-btn { background: white; color: #555; border: 2px solid var(--accent); text-transform: none; text-align: left; font-weight: normal; margin-bottom: 8px; }
        
        .stat-box { border: 2px dashed var(--primary); padding: 15px; margin: 15px 0; background: rgba(255, 119, 188, 0.05); border-radius: 20px; text-align: left; }
        
        /* Corazón Final */
        #love-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .heart { font-size: 8rem; animation: beat 0.6s infinite; color: #ff4b4b; text-shadow: 0 0 30px rgba(255, 75, 75, 0.5); }
        .love-msg { font-size: 3rem; font-family: 'Brush Script MT', cursive; color: var(--primary); margin-top: 20px; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="app-container">
    <h1 style="color: var(--primary); text-shadow: 2px 2px #fff;">✨ AETHER CORE v14.0</h1>

    <div id="screen-net">
        <div id="user-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;"></div>
        <button id="btn-new">✨ CREAR CONEXIÓN IA</button>
    </div>

    <div id="screen-test" class="hidden">
        <div id="q-content" class="q-text"></div>
        <div id="options-box"></div>
    </div>

    <div id="screen-res" class="hidden">
        <div class="stat-box" style="text-align: center;">
            <h2 id="pony-name" style="margin:0; color: var(--primary);"></h2>
            <p id="pony-rank" style="font-weight: bold; color: var(--secondary);"></p>
        </div>
        <div id="skills-ia" class="stat-box"></div>
        <button id="btn-save" style="background: #ffcc00;">💾 GUARDAR Y AMAR</button>
        <button onclick="location.reload()" style="background: #aaa;">VOLVER</button>
    </div>
</div>

<div id="love-screen" class="hidden">
    <div class="heart">❤️</div>
    <div class="love-msg">TE AMO AMOR</div>
    <button onclick="location.reload()" style="width: auto; padding: 10px 40px; margin-top: 30px;">REINICIAR RED</button>
</div>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    let w, h, particles = [];
    function initCanvas() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.onresize = initCanvas; initCanvas();

    class Particle {
        constructor() { this.x = Math.random()*w; this.y = Math.random()*h; this.s = Math.random()*2; this.v = Math.random()*0.5; }
        draw() { ctx.fillStyle = "rgba(179, 119, 255, 0.5)"; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill(); this.y -= this.v; if(this.y < 0) this.y = h; }
    }
    for(let i=0; i<100; i++) particles.push(new Particle());
    function anim() { ctx.clearRect(0,0,w,h); particles.forEach(p => p.draw()); requestAnimationFrame(anim); } anim();

    // --- LÓGICA DE IA ---
    let db = JSON.parse(localStorage.getItem('mlp_aether_db')) || [];
    let curPony = null, qCount = 0;

    function buildIAQuestion() {
        const S = ["Un cometa de azúcar", "El susurro del Bosque", "Un cristal prohibido", "La sombra de un sueño"];
        const V = ["despierta", "consume", "fragmenta", "ilumina"];
        const C = ["tu memoria", "la armonía", "el espacio", "tu destino"];
        const q = `${S[Math.floor(Math.random()*4)]} ${V[Math.floor(Math.random()*4)]} ${C[Math.floor(Math.random()*4)]}. ¿Cómo reacciona tu núcleo?`;
        
        const os = ["Canalizo amor puro para sanarlo.", "Uso mi voluntad para crear un escudo.", "Busco la verdad oculta tras el caos.", "Me fusiono con la energía del cambio.", "Pido ayuda a mis amigos del alma."];
        return { q, os: os.sort(() => Math.random()-0.5) };
    }

    function buildIASkill() {
        const p = ["Nexo", "Resonancia", "Velo", "Cénit", "Eco"];
        const m = ["Dimensional", "Estelar", "de Almas", "Eterno"];
        const e = ["permite ver el futuro", "anula la tristeza", "crea luz infinita", "conecta corazones"];
        return { n: `${p[Math.floor(Math.random()*5)]} ${m[Math.floor(Math.random()*4)]}`, d: `IA generó: Esta magia ${e[Math.floor(Math.random()*4)]}.` };
    }

    const screens = { net: 'screen-net', test: 'screen-test', res: 'screen-res' };
    function show(s) { Object.values(screens).forEach(x => document.getElementById(x).classList.add('hidden')); document.getElementById(s).classList.remove('hidden'); }

    document.getElementById('btn-new').onclick = () => {
        let n = prompt("Nombre del Poni:"); if(!n) return;
        curPony = { n, r: "Calculando...", s: [], id: Date.now() };
        qCount = 0; show(screens.test); nextQ();
    };

    function nextQ() {
        if(qCount >= 5) { 
            curPony.r = "Alicornio Aether"; curPony.s.push(buildIASkill()); 
            db.push(curPony); renderRes(); return; 
        }
        const data = buildIAQuestion();
        document.getElementById('q-content').innerText = data.q;
        const box = document.getElementById('options-box'); box.innerHTML = "";
        data.os.forEach(o => {
            const b = document.createElement('button'); b.className = "opt-btn"; b.innerText = o;
            b.onclick = () => { qCount++; nextQ(); };
            box.appendChild(b);
        });
    }

    function renderRes() {
        show(screens.res);
        document.getElementById('pony-name').innerText = curPony.n.toUpperCase();
        document.getElementById('pony-rank').innerText = curPony.r;
        const list = document.getElementById('skills-ia'); list.innerHTML = "<strong>HABILIDADES APRENDIDAS:</strong>";
        curPony.s.forEach(s => list.innerHTML += `<p><small><strong>${s.n}</strong>: ${s.d}</small></p>`);
    }

    document.getElementById('btn-save').onclick = () => {
        localStorage.setItem('mlp_aether_db', JSON.stringify(db));
        document.getElementById('love-screen').classList.remove('hidden');
    };

    // Lista inicial
    db.forEach(p => {
        const item = document.createElement('div'); item.className = "stat-box";
        item.innerHTML = `<strong>${p.n}</strong> - ${p.r}`;
        document.getElementById('user-list').appendChild(item);
    });
</script>
</body>
</html>
