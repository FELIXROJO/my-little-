<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregunta Especial ❤️</title>
    <style>
        /* CSS INTEGRADO */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeef2;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #main-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(214, 51, 132, 0.2);
            text-align: center;
            z-index: 10;
            transition: all 0.3s ease;
            max-width: 90%;
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, font-size 0.2s ease;
            font-weight: bold;
        }

        #btn-si {
            background-color: #4CAF50;
            color: white;
            position: relative;
            z-index: 100;
        }

        #btn-no {
            background-color: #f44336;
            color: white;
            position: relative;
        }

        /* Pantalla de éxito */
        #celebration {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .heart-anim {
            font-size: 100px;
            animation: beat 0.8s infinite;
        }

        h2 {
            color: #e63946;
            font-size: 3.5rem;
            margin: 20px;
            text-shadow: 2px 2px 0px #ffccd5;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Pétalos cayendo */
        .petal {
            position: fixed;
            top: -50px;
            font-size: 1.5rem;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div id="main-card">
        <h1>¿Tú me amas?</h1>
        <div class="buttons">
            <button id="btn-si">Sí</button>
            <button id="btn-no">No</button>
        </div>
    </div>

    <div id="celebration">
        <div class="heart-anim">💍</div>
        <h2>¡CÁSATE CONMIGO!</h2>
        <div class="heart-anim">❤️</div>
    </div>

    <script>
        /* JAVASCRIPT INTEGRADO */
        const btnSi = document.getElementById('btn-si');
        const btnNo = document.getElementById('btn-no');
        const card = document.getElementById('main-card');
        const celebration = document.getElementById('celebration');

        let scaleSi = 1;
        let fontSizeSi = 1.2;

        // Lógica cuando presionan "No"
        btnNo.addEventListener('click', () => {
            // 1. El botón SÍ crece cada vez más
            scaleSi += 0.8; 
            fontSizeSi += 0.4;
            btnSi.style.transform = `scale(${scaleSi})`;
            btnSi.style.fontSize = `${fontSizeSi}rem`;

            // 2. Mover el botón NO a una posición aleatoria para que sea difícil darle
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            
            btnNo.style.position = 'absolute';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        });

        // Lógica cuando presionan "Sí"
        btnSi.addEventListener('click', () => {
            card.style.display = 'none';
            celebration.style.display = 'flex';
            lanzarPetalos();
        });

        function lanzarPetalos() {
            const emojis = ['🌸', '✨', '❤️', '💖', '🌹'];
            for (let i = 0; i < 100; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                petal.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = Math.random() * 2 + 3 + 's';
                petal.style.opacity = Math.random();
                document.body.appendChild(petal);
            }
        }
    </script>

</body>
</html>
