<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aether Infinity</title>

<style>

:root{
--primary:#ff77bc;
--secondary:#b377ff;
--accent:#77e5ff;
--bg:#050505;
}

body{
margin:0;
background:var(--bg);
font-family:Segoe UI;
overflow:hidden;
color:white;
}

/* estrellas fondo */

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* stage */

#stage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
position:relative;
z-index:2;
}

/* ventana */

.window{
background:white;
color:black;
padding:30px;
border-radius:30px;
width:520px;
max-width:90%;
text-align:center;
animation:fadeIn .5s;
box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.hidden{display:none;}

button{
padding:15px;
border:none;
border-radius:20px;
margin:6px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(135deg,var(--secondary),var(--primary));
color:white;
width:100%;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.opt{
background:white;
color:black;
border:2px solid #eee;
}

.opt:hover{
background:var(--secondary);
color:white;
}

.card{
background:#fafafa;
padding:15px;
border-radius:15px;
margin:10px 0;
}

/* progreso */

#progressBar{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

#progressFill{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--primary),var(--accent));
transition:.4s;
}

/* animaciones */

.magic{
animation:magic .3s;
}

@keyframes magic{
0%{transform:scale(1)}
50%{transform:scale(1.03)}
100%{transform:scale(1)}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* pantalla amor */

#love{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#love.hidden{
display:none;
}

.heart{
font-size:120px;
color:#ff3b6b;
animation:beat .5s infinite alternate;
}

@keyframes beat{
from{transform:scale(1)}
to{transform:scale(1.25)}
}

.loveText{
font-size:70px;
color:#ff77bc;
font-family:cursive;
margin-top:20px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="stage">

<div id="menu" class="window">

<h2>AETHER INFINITY</h2>

<div id="list"></div>

<button onclick="newPony()">Crear Pony</button>

</div>

<div id="create" class="window hidden">

<h3>Nombre del Pony</h3>

<input id="name" style="padding:10px;width:80%">

<br><br>

<button onclick="startTest()">Comenzar</button>
<button onclick="back()">Volver</button>

</div>

<div id="test" class="window hidden">

<div id="progressBar">
<div id="progressFill"></div>
</div>

<div id="progressText"></div>

<h3 id="question"></h3>

<div id="options"></div>

</div>

<div id="result" class="window hidden">

<h2 id="r_name"></h2>
<p id="r_race"></p>
<p id="r_level"></p>
<p id="r_story"></p>

<h3>Habilidades</h3>

<div id="r_skills"></div>

<button onclick="save()">Guardar</button>
<button onclick="back()">Volver</button>

</div>

</div>

<!-- pantalla amor -->

<div id="love" class="hidden">

<div class="heart">❤️</div>

<div class="loveText">TE AMO AMOR</div>

</div>

<script>

/* estrellas fondo */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

let w,h,stars=[]

function resize(){
w=canvas.width=window.innerWidth
h=canvas.height=window.innerHeight
}

window.onresize=resize
resize()

for(let i=0;i<150;i++){
stars.push({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*1.5,
v:Math.random()*0.3
})
}

function draw(){
ctx.fillStyle="#050505"
ctx.fillRect(0,0,w,h)

stars.forEach(s=>{
s.y-=s.v
if(s.y<0)s.y=h

ctx.fillStyle="#ff77bc"
ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()
})

requestAnimationFrame(draw)
}

draw()

/* juego */

let store = JSON.parse(localStorage.getItem("aether")) || []
let active=null
let step=0

const questions=[
"Un portal mágico aparece frente a ti",
"Un amigo necesita ayuda",
"Una tormenta amenaza la ciudad",
"Descubres un cristal antiguo",
"Un enemigo desafía tu destino"
]

function show(id){

["menu","create","test","result"].forEach(v=>{
document.getElementById(v).classList.add("hidden")
})

document.getElementById(id).classList.remove("hidden")

}

function newPony(){
show("create")
}

function back(){
show("menu")
refresh()
}

function startTest(){

const name=document.getElementById("name").value.trim()

if(!name)return

active={
name:name,
magic:0,
kind:0,
power:0,
skills:[],
level:1
}

step=0

show("test")

run()

}

function run(){

updateProgress()

if(step>=questions.length){
finish()
return
}

document.getElementById("question").innerText=questions[step]

const box=document.getElementById("options")
box.innerHTML=""

createOption("Usar magia antigua","magic")
createOption("Ayudar con amistad","kind")
createOption("Enfrentar con poder","power")

}

function createOption(text,type){

const b=document.createElement("button")
b.className="opt"
b.innerText=text

b.onclick=()=>{

document.getElementById("test").classList.add("magic")

setTimeout(()=>{

document.getElementById("test").classList.remove("magic")

active[type]++
step++

run()

},200)

}

document.getElementById("options").appendChild(b)

}

function updateProgress(){

const percent=(step/questions.length)*100

document.getElementById("progressFill").style.width=percent+"%"

document.getElementById("progressText").innerText=
"Pregunta "+(step+1)+" / "+questions.length

}

function finish(){

let race=""

if(active.magic>active.power && active.magic>active.kind)
race="Unicornio Arcano"

else if(active.power>active.magic && active.power>active.kind)
race="Pegaso Guerrero"

else if(active.kind>active.power)
race="Pony de la Armonía"

else
race="Alicornio Legendario"

active.race=race
active.level=Math.floor(Math.random()*10)+1

active.skills.push(skill())
active.skills.push(skill())

active.story="Un pony cuyo destino fue marcado por la magia de Equestria."

render()

}

function skill(){

const names=[
"Resonancia Estelar",
"Nexo de Cristal",
"Pulso de Armonía",
"Alma Prismática",
"Tormenta Celestial",
"Llama Astral"
]

return names[Math.floor(Math.random()*names.length)]

}

function render(){

show("result")

document.getElementById("r_name").innerText=active.name
document.getElementById("r_race").innerText=active.race
document.getElementById("r_level").innerText="Nivel mágico: "+active.level
document.getElementById("r_story").innerText=active.story

const s=document.getElementById("r_skills")
s.innerHTML=""

active.skills.forEach(v=>{
const d=document.createElement("div")
d.className="card"
d.innerText=v
s.appendChild(d)
})

}

function save(){

store.push(active)

localStorage.setItem("aether",JSON.stringify(store))

document.getElementById("love").classList.remove("hidden")

setTimeout(()=>{

document.getElementById("love").classList.add("hidden")

back()

},5000)

}

function refresh(){

const list=document.getElementById("list")
list.innerHTML=""

store.forEach((p,i)=>{

const d=document.createElement("div")
d.className="card"

d.innerHTML=
"<b>"+p.name+"</b><br>"+p.race+
"<br>Nivel "+p.level+
"<br><button onclick='del("+i+")'>Borrar</button>"

list.appendChild(d)

})

}

function del(i){

store.splice(i,1)

localStorage.setItem("aether",JSON.stringify(store))

refresh()

}

refresh()

</script>

</body>
</html>
