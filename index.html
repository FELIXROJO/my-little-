<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLP: Aether Saga Engine</title>
    <style>
        :root {
            --primary: #ff77bc; --secondary: #b377ff; --accent: #77e5ff;
            --bg: #050505; --card: rgba(255, 255, 255, 0.98); --text: #2d3436;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #game-canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui-layer {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
        }

        .window {
            background: var(--card); padding: 2.5rem; border-radius: 35px;
            border: 5px solid var(--secondary);
            box-shadow: 0 20px 60px rgba(179, 119, 255, 0.4);
            width: 90%; max-width: 550px; text-align: center;
            transform-style: preserve-3d; animation: windowSpawn 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes windowSpawn {
            from { opacity: 0; transform: scale(0.8) rotateX(-20deg); }
            to { opacity: 1; transform: scale(1) rotateX(0deg); }
        }

        .hidden { display: none !important; }
        
        h1 { color: var(--primary); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        
        button {
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--secondary), #8e44ad);
            color: white; border: none; border-radius: 50px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; margin-top: 15px;
            transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(142, 68, 173, 0.4);
            font-size: 0.9rem;
        }
        button:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 20px rgba(142, 68, 173, 0.6); }
        button:active { transform: translateY(1px); }

        .q-card { text-align: left; animation: slideIn 0.4s ease-out; }
        .q-text { 
            color: var(--secondary); font-size: 1.15rem; font-weight: 800; 
            margin-bottom: 25px; line-height: 1.6; border-left: 6px solid var(--primary); 
            padding-left: 20px; 
        }

        .opt-btn { 
            background: #f8f9fa; color: var(--text); border: 2px solid #e9ecef; 
            text-transform: none; text-align: left; font-weight: 500; font-size: 0.95rem;
        }
        .opt-btn:hover { border-color: var(--accent); background: #f0faff; }

        .character-slot {
            background: #fff; border: 2px solid #eee; padding: 15px;
            border-radius: 20px; margin-bottom: 12px; display: flex;
            justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .character-slot:hover { border-color: var(--primary); transform: translateX(5px); }

        /* Pantalla Love */
        #love-engine {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 99999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .mega-heart { font-size: 10rem; animation: heartPump 0.5s infinite alternate; color: #ff4757; }
        .love-banner { font-family: 'Brush Script MT', cursive; font-size: 4rem; color: var(--primary); margin-top: 30px; }
        
        @keyframes heartPump { from { transform: scale(1); } to { transform: scale(1.25); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="ui-layer">
    <div id="scr-selector" class="window">
        <h1>✨ AETHER SAGA</h1>
        <div id="pony-list" style="max-height: 300px; overflow-y: auto; padding: 10px;"></div>
        <button id="btn-new-game">💎 CREAR NUEVA LEYENDA</button>
    </div>

    <div id="scr-login" class="window hidden">
        <p>Iniciando secuencia de encarnación...</p>
        <input type="text" id="name-input" placeholder="NOMBRE DEL PONI" 
               style="width:100%; padding:18px; border-radius:50px; border:2px solid var(--accent); text-align:center; font-size:1.2rem; outline:none; box-sizing:border-box;">
        <button id="btn-begin-ritual">VINCULAR ESENCIA</button>
        <button id="btn-cancel" style="background:none; color:#999; box-shadow:none;">ABORTAR</button>
    </div>

    <div id="scr-test" class="window hidden">
        <div class="q-card">
            <p id="q-meta" style="color:var(--primary); font-weight:bold; font-size:0.8rem;"></p>
            <div id="q-text" class="q-text"></div>
            <div id="options-container" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </div>
    </div>

    <div id="scr-result" class="window hidden">
        <div class="stat-box" style="border: 3px solid var(--primary); padding: 20px; border-radius: 25px; margin-bottom: 20px;">
            <h2 id="res-name" style="margin:0; color:var(--secondary);"></h2>
            <p id="res-rank" style="font-weight:900; color:gold; margin:5px 0;"></p>
        </div>
        <div id="res-skills" style="text-align: left; margin-bottom: 20px;"></div>
        <button id="btn-evolve">🧬 EVOLUCIONAR (MAX 3)</button>
        <button id="btn-final-save" style="background:#ffcc00;">💖 GUARDAR Y FINALIZAR</button>
    </div>
</div>

<div id="love-engine" class="hidden">
    <div class="mega-heart">❤️</div>
    <div class="love-banner">TE AMO AMOR</div>
</div>

<script>
    // --- MOTOR GRÁFICO ---
    const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
    let w, h, stars = [];
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    class Star {
        constructor() { this.reset(); }
        reset() { this.x = Math.random()*w; this.y = Math.random()*h; this.z = Math.random()*w; }
        update() { this.z -= 5; if(this.z <= 0) this.reset(); }
        draw() {
            let sx = (this.x - w/2) * (w/this.z) + w/2;
            let sy = (this.y - h/2) * (w/this.z) + h/2;
            let size = (1 - this.z/w) * 3;
            ctx.fillStyle = `rgba(179, 119, 255, ${1 - this.z/w})`;
            ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI*2); ctx.fill();
        }
    }
    for(let i=0; i<200; i++) stars.push(new Star());
    function frame() { ctx.fillStyle = '#050505'; ctx.fillRect(0,0,w,h); stars.forEach(s => { s.update(); s.draw(); }); requestAnimationFrame(frame); } frame();

    // --- LÓGICA DEL JUEGO ---
    let db = JSON.parse(localStorage.getItem('mlp_aether_saga_v15')) || [];
    let cur = null, qIdx = 0;

    const pool = {
        s: ["Una nebulosa", "El cristal", "La profecía", "El heraldo", "La chispa"],
        v: ["fragmenta", "despierta", "ilumina", "corrompe", "teje"],
        c: ["el tiempo", "tu alma", "la realidad", "el futuro", "la armonía"]
    };

    function genQ() {
        const text = `${pool.s[qIdx]} ${pool.v[Math.floor(Math.random()*5)]} ${pool.c[Math.floor(Math.random()*5)]}. ¿Cuál es tu respuesta?`;
        const opts = [
            "Respondo con la fuerza de mis alas.",
            "Dejo que mi magia de unicornio decida.",
            "Me mantengo firme en la tierra.",
            "Busco el equilibrio de los Elementos.",
            "Sacrifico mi energía por los demás."
        ].sort(() => Math.random() - 0.5);
        return { text, opts };
    }

    function genSkill() {
        const n = ["Nova", "Vínculo", "Espejo", "Cénit", "Santuario"][Math.floor(Math.random()*5)];
        const e = ["estelar", "mágico", "eterno", "prohibido"][Math.floor(Math.random()*4)];
        return { n: `${n} ${e}`, d: "Generado por IA: Modifica la esencia de la realidad." };
    }

    const scr = { sel: 'scr-selector', log: 'scr-login', test: 'scr-test', res: 'scr-result', love: 'love-engine' };
    function show(id) { Object.values(scr).forEach(k => document.getElementById(k).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

    function refreshList() {
        const list = document.getElementById('pony-list');
        list.innerHTML = db.length ? "" : "<p style='color:#999'>Sin registros.</p>";
        db.forEach((p, i) => {
            const d = document.createElement('div'); d.className = 'character-slot';
            d.innerHTML = `<div><strong>${p.n}</strong><br><small>${p.r}</small></div><button onclick="play(${i})" style="width:auto; padding:5px 15px; margin:0;">ABRIR</button>`;
            list.appendChild(d);
        });
    }

    window.play = (i) => { cur = db[i]; renderRes(); };

    document.getElementById('btn-new-game').onclick = () => show(scr.log);
    document.getElementById('btn-cancel').onclick = () => show(scr.sel);

    document.getElementById('btn-begin-ritual').onclick = () => {
        const val = document.getElementById('name-input').value.trim();
        if(!val) return;
        cur = { n: val, r: "Iniciado", s: [], id: Date.now() };
        qIdx = 0; show(scr.test); nextQ();
    };

    function nextQ() {
        if(qIdx >= 5) { // Límite estricto de 5 preguntas
            cur.r = "Alicornio de Aether";
            cur.s.push(genSkill());
            db.push(cur); renderRes(); return;
        }
        const data = genQ();
        document.getElementById('q-meta').innerText = `SECUENCIA ${qIdx + 1} / 5`;
        document.getElementById('q-text').innerText = data.text;
        const box = document.getElementById('options-container'); box.innerHTML = "";
        data.opts.forEach(o => {
            const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = o;
            b.onclick = () => { qIdx++; nextQ(); };
            box.appendChild(b);
        });
    }

    function renderRes() {
        show(scr.res);
        document.getElementById('res-name').innerText = cur.n.toUpperCase();
        document.getElementById('res-rank').innerText = cur.r;
        const sl = document.getElementById('res-skills');
        sl.innerHTML = `<strong>HABILIDADES (MAX 3):</strong> [${cur.s.length}/3]`;
        cur.s.forEach(s => sl.innerHTML += `<div style="margin-top:10px; border-left:3px solid var(--accent); padding-left:10px; font-size:0.8rem;"><strong>${s.n}</strong>: ${s.d}</div>`);
        document.getElementById('btn-evolve').style.display = cur.s.length >= 3 ? "none" : "block";
    }

    document.getElementById('btn-evolve').onclick = () => {
        if(cur.s.length < 3) {
            cur.s.push(genSkill());
            renderRes();
        }
    };

    document.getElementById('btn-final-save').onclick = () => {
        const idx = db.findIndex(p => p.id === cur.id);
        if(idx !== -1) db[idx] = cur;
        localStorage.setItem('mlp_aether_saga_v15', JSON.stringify(db));
        
        // SECUENCIA DE AMOR 5 SEGUNDOS
        show(scr.love);
        setTimeout(() => {
            show(scr.sel);
            refreshList();
        }, 5000); // 5 segundos exactos
    };

    refreshList();
</script>
</body>
</html>
